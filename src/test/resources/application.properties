tailormap-api.base-path=/api
tailormap-api.admin.base-path=/api/admin
management.endpoints.web.base-path=/api/actuator
tailormap-api.new-admin-username=tm-admin
# deprecated
tailormap-api.export.allowed-outputformats=application/geopackage+sqlite3,application/json
# see org.tailormap.api.controller.LayerExtractController.ExtractOutputFormat for valid values
tailormap-api.extract.allowed-outputformats=csv,geojson,xlsx,shape,geopackage
# any files older than this (in minutes) in the extract output directory will be deleted by a scheduled job, to prevent filling up the disk
# tailormap-api.extract.cleanup-minutes=120
# the directory where the extract output files are stored, should be writable by the application
# tailormap-api.extract.location=/tmp

tailormap-api.timeout=5000
tailormap-api.management.hashed-password=#{null}
# A list of allowed metrics for the ingest metrics endpoint; do use lowercase and underscores to separate words.
tailormap-api.allowed-metrics=tailormap_applayer_switched_on, test_metric

spring.profiles.active=test
spring.profiles.default=test
spring.main.allow-bean-definition-overriding=true
spring.main.banner-mode=off

spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# we don't need JMX
spring.jmx.enabled=false

# Jackson configuration
spring.jackson.serialization.indent_output=true
spring.jackson.mapper.accept-case-insensitive-enums=true
spring.jackson.datatype.enum.write-enums-to-lowercase=false
spring.jackson.datatype.enum.write-enums-using-to-string=false
spring.jackson.datatype.enum.read-enums-using-to-string=false

# XXX does not work?
logging.level.org.springframework=INFO

logging.level.org.tailormap.api=DEBUG
#logging.level.org.tailormap.api.security=TRACE

# log all GeoTools jdbc interactions
#logging.level.org.geotools.jdbc=DEBUG

# Create logfile in target directory
logging.file.name=target/tailormap.log

spring.flyway.default-schema=public
spring.flyway.schemas=public,quartz,data

# Quartz configuration
spring.quartz.job-store-type=jdbc
spring.quartz.properties.org.quartz.jobStore.tablePrefix=quartz.
spring.quartz.jdbc.initialize-schema=never
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
spring.quartz.properties.org.quartz.threadPool.threadCount=6
spring.quartz.properties.org.quartz.scheduler.startup-delay=1s
spring.quartz.overwrite-existing-jobs=true

# Hibernate Envers configuration
# use this to enable/disable Envers auditing
spring.jpa.properties.hibernate.integration.envers.enabled=false
spring.jpa.properties.org.hibernate.envers.default_schema=history
spring.jpa.properties.org.hibernate.envers.revision_field_name=revision_number
spring.jpa.properties.org.hibernate.envers.revision_type_field_name=revision_type
spring.jpa.properties.org.hibernate.envers.audit_table_suffix=_revisions

# Use the Hibernate's Jackson 3 based JsonFormatMapper
# see https://docs.hibernate.org/orm/7.3/whats-new/#jackson-3-support
spring.jpa.properties.hibernate.type.json_format_mapper=org.hibernate.type.format.jackson.Jackson3JsonFormatMapper